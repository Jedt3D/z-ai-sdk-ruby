name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        ruby-version: ['3.2.8', '3.3.0', '3.4.0']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true
    
    - name: Install dependencies
      run: bundle install
    
    - name: Run smoke test
      run: ruby smoke_test.rb
    
    - name: Run verification
      run: ruby verify_sdk.rb
    
    - name: Run tests
      run: bundle exec rake
    
    - name: Run RuboCop
      run: bundle exec rubocop
    
    - name: Check code coverage
      run: bundle exec rake coverage:check

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.8'
        bundler-cache: true
    
    - name: Build gem
      run: gem build *.gemspec
    
    - name: Upload gem artifact
      uses: actions/upload-artifact@v4
      with:
        name: gem-package
        path: *.gem
        retention-days: 30

  openspec-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check OpenSpec changes
      run: |
        if [ -d "openspec" ]; then
          echo "OpenSpec directory found"
          echo "Checking for changes in openspec/ directory..."
          
          # List all OpenSpec changes if they exist
          if [ -d "openspec/changes" ]; then
            echo "Active changes:"
            find openspec/changes -maxdepth 1 -type d -not -path "openspec/changes" | while read change; do
              basename "$change"
            done
          fi
        else
          echo "No OpenSpec directory found"
        fi