# RuboCop configuration for Z.ai Ruby SDK

require:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2.8
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'spec/fixtures/**/*'
    - 'examples/**/*'
    - 'bin/**/*'
    - 'Rakefile'
    - '*.gemspec'

Layout/LineLength:
  Max: 120
  Exclude:
    - 'spec/**/*'

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'examples/**/*'

Metrics/MethodLength:
  Max: 20
  Exclude:
    - 'spec/**/*'

Metrics/ClassLength:
  Max: 150

Metrics/ModuleLength:
  Max: 150

Style/Documentation:
  Enabled: true
  Exclude:
    - 'spec/**/*'
    - 'examples/**/*'

Style/FrozenStringLiteralComment:
  Enabled: true

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/HashSyntax:
  EnforcedStyle: ruby19_no_mixed_keys

Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent

Layout/FirstArrayElementIndentation:
  EnforcedStyle: consistent

RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false

RSpec/DescribeClass:
  Exclude:
    - 'spec/integration/**/*'

Naming/FileName:
  Exclude:
    - 'lib/zai-ruby-sdk.rb'
    - 'spec/factories.rb'

Gemspec/RequiredRubyVersion:
  Enabled: true
